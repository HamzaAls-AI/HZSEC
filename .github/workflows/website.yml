name: hzsec-website

on:
  pull_request:
    paths:
      - 'hzsec-website/**'
      - '.github/workflows/website.yml'
  push:
    branches: [main]
    paths:
      - 'hzsec-website/**'
      - '.github/workflows/website.yml'

defaults:
  run:
    working-directory: hzsec-website

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: hzsec-website/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ''
          CLERK_SECRET_KEY: ''
          NEXT_PUBLIC_BACKEND_URL: http://localhost:8080
