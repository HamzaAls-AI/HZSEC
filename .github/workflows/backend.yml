name: hzsec-backend

on:
  pull_request:
    paths:
      - 'hzsec-backend/**'
      - '.github/workflows/backend.yml'
  push:
    branches: [main]
    paths:
      - 'hzsec-backend/**'
      - '.github/workflows/backend.yml'

defaults:
  run:
    working-directory: hzsec-backend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: hzsec-backend/package-lock.json
      - run: npm ci
      - name: Prisma generate
        run: npx prisma generate
      - name: Syntax check
        run: find src -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Tests
        run: npm test
