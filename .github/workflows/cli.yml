name: hzsec-cli

on:
  pull_request:
    paths:
      - 'hzsec-cli/**'
      - '.github/workflows/cli.yml'
  push:
    branches: [main]
    paths:
      - 'hzsec-cli/**'
      - '.github/workflows/cli.yml'

defaults:
  run:
    working-directory: hzsec-cli

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: hzsec-cli/package-lock.json
      - run: npm ci
      - name: Syntax check
        run: find lib bin -name '*.js' -print0 | xargs -0 -n1 node --check
      - name: Smoke tests
        run: npm test
