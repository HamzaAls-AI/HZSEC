name: hzsec-action

on:
  pull_request:
    paths:
      - 'hzsec-action/**'
      - '.github/workflows/action.yml'
  push:
    branches: [main]
    paths:
      - 'hzsec-action/**'
      - '.github/workflows/action.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint action.yml with actionlint
        uses: docker://rhysd/actionlint:1.7.7
        with:
          args: -color hzsec-action/action.yml
