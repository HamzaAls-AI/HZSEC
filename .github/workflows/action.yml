name: hzsec-action

on:
  pull_request:
    paths:
      - 'hzsec-action/**'
      - '.github/workflows/action.yml'
  push:
    branches: [main]
    paths:
      - 'hzsec-action/**'
      - '.github/workflows/action.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate action.yml is valid YAML
        run: python3 -c "import yaml, sys; yaml.safe_load(open('hzsec-action/action.yml')); print('action.yml: valid YAML')"
