name: desktop-app

on:
  pull_request:
    paths:
      - 'main.js'
      - 'preload.js'
      - 'renderer.js'
      - 'index.html'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/desktop.yml'
  push:
    branches: [main]
    paths:
      - 'main.js'
      - 'preload.js'
      - 'renderer.js'
      - 'index.html'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/desktop.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Syntax check
        run: |
          node --check main.js
          node --check preload.js
          node --check renderer.js
          find src -name '*.js' -print0 | xargs -0 -n1 node --check
