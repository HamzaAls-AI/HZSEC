# Build + sign + publish a release of HZSec on every `v*` tag push.
#
# Triggered by:
#     git tag v1.2.3
#     git push --tags
#
# What happens, in order:
#   1. macOS runner — installs Node 20, runs `npm ci`, electron-builder
#      builds dmg + zip, notarizes via the Apple credentials below,
#      uploads artifacts to the GitHub Release.
#   2. Windows runner — same shape, builds nsis + portable, signs with the
#      EV cert provided via CSC_LINK + CSC_KEY_PASSWORD.
#   3. (Optional) Linux job — produces an AppImage + .deb, no signing.
#
# A draft release is created automatically; once both jobs succeed you can
# polish the notes from CHANGELOG.md and publish it from the GitHub UI.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#
#   APPLE_ID                       — your Apple ID email
#   APPLE_APP_SPECIFIC_PASSWORD    — generated at appleid.apple.com → Sign-In and Security → App-Specific Passwords
#   APPLE_TEAM_ID                  — 10-char team ID from developer.apple.com → Membership
#   CSC_LINK                       — base64 of your Apple Developer ID .p12 (or path to it on the runner)
#   CSC_KEY_PASSWORD               — password for the .p12
#   WIN_CSC_LINK                   — base64 of your Windows EV signing .pfx
#   WIN_CSC_KEY_PASSWORD           — password for the .pfx
#   GH_TOKEN                       — GitHub token w/ contents:write (the default GITHUB_TOKEN works for same-repo releases)
#   SENTRY_DSN                     — (optional) baked into the build for crash reporting

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write    # needed for electron-builder to create / upload to GitHub Releases

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Show version
        run: node -p "require('./package.json').version"

      - name: Build + publish (macOS)
        if: matrix.os == 'macos-latest'
        env:
          APPLE_ID:                    ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID:               ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK:                    ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD:            ${{ secrets.CSC_KEY_PASSWORD }}
          GH_TOKEN:                    ${{ secrets.GITHUB_TOKEN }}
          SENTRY_DSN:                  ${{ secrets.SENTRY_DSN }}
        run: npm run release -- --mac

      - name: Build + publish (Windows)
        if: matrix.os == 'windows-latest'
        env:
          CSC_LINK:           ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD:   ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          GH_TOKEN:           ${{ secrets.GITHUB_TOKEN }}
          SENTRY_DSN:         ${{ secrets.SENTRY_DSN }}
        run: npm run release -- --win

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hzsec-${{ matrix.os }}-${{ github.ref_name }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/latest*.yml
          if-no-files-found: ignore
          retention-days: 14

  # Linux build is cheap and unsigned — keep it on as a courtesy.
  build-linux:
    name: Build (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - env:
          GH_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: npm run release -- --linux
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hzsec-linux-${{ github.ref_name }}
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/latest-linux.yml
          if-no-files-found: ignore
          retention-days: 14
