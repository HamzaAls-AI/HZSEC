name: hzsec-growth

on:
  pull_request:
    paths:
      - 'HZSec - Growth/**'
      - '.github/workflows/growth.yml'
  push:
    branches: [main]
    paths:
      - 'HZSec - Growth/**'
      - '.github/workflows/growth.yml'

defaults:
  run:
    working-directory: "HZSec - Growth/hzsec-growth"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: "HZSec - Growth/hzsec-growth/package-lock.json"
      - run: npm ci
      - name: Syntax check
        run: |
          node --check main.js
          node --check preload.js
          node --check renderer.js
          find src -name '*.js' -print0 | xargs -0 -n1 node --check
