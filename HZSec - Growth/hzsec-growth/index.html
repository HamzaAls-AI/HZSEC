<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>HZSec Growth</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'"
    />
    <style>
      :root {
        --bg: #0f1115;
        --panel: #171a21;
        --panel-2: #1f242d;
        --border: #2a2f3a;
        --text: #e7eaf0;
        --muted: #8a93a6;
        --accent: #4ade80;
        --accent-dim: #1f3d2a;
        --danger: #ef4444;
        --warn: #f59e0b;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
          "Segoe UI", sans-serif;
        font-size: 14px;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 24px;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
      }
      header h1 {
        margin: 0;
        font-size: 18px;
        letter-spacing: 0.3px;
      }
      header .status {
        color: var(--muted);
        font-size: 12px;
      }
      nav {
        display: flex;
        gap: 4px;
        padding: 8px 24px;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
      }
      nav button {
        background: transparent;
        color: var(--muted);
        border: none;
        padding: 8px 14px;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
      }
      nav button.active {
        background: var(--panel-2);
        color: var(--text);
      }
      nav button:hover { color: var(--text); }
      main { padding: 24px; max-width: 960px; margin: 0 auto; }
      .panel { display: none; }
      .panel.active { display: block; }

      .toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }
      button.btn {
        background: var(--panel-2);
        color: var(--text);
        border: 1px solid var(--border);
        padding: 8px 14px;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
      }
      button.btn:hover { border-color: var(--accent); }
      button.btn.primary { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
      button.btn.danger { color: var(--danger); border-color: var(--danger); background: transparent; }

      input.text, textarea.text {
        background: var(--panel-2);
        color: var(--text);
        border: 1px solid var(--border);
        padding: 8px 10px;
        border-radius: 6px;
        font-size: 13px;
        font-family: inherit;
        width: 100%;
      }
      textarea.text { min-height: 80px; resize: vertical; }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 12px;
      }
      .card .title {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .card .meta {
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 10px;
      }
      .card .body {
        color: #c9cfdd;
        font-size: 13px;
        line-height: 1.5;
        margin-bottom: 12px;
        max-height: 100px;
        overflow: hidden;
      }
      .card .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .score-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
        margin-left: 8px;
      }
      .score-high { background: var(--accent-dim); color: var(--accent); }
      .score-mid { background: #3a2f15; color: var(--warn); }
      .score-low { background: #2a2f3a; color: var(--muted); }
      .reason { color: var(--muted); font-size: 12px; font-style: italic; }

      .reply-option {
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 12px;
        margin-bottom: 8px;
      }
      .reply-option .style-tag {
        display: inline-block;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--muted);
        margin-bottom: 6px;
      }
      .reply-option .text-content {
        color: var(--text);
        line-height: 1.5;
        font-size: 13px;
        white-space: pre-wrap;
        margin-bottom: 10px;
      }

      .row { display: flex; gap: 8px; align-items: center; }
      .row > input.text { flex: 1; }

      .tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--panel-2);
        border: 1px solid var(--border);
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 12px;
        margin: 0 6px 6px 0;
      }
      .tag button {
        background: transparent;
        color: var(--muted);
        border: none;
        cursor: pointer;
        padding: 0;
        font-size: 14px;
        line-height: 1;
      }
      .tag button:hover { color: var(--danger); }

      .empty {
        color: var(--muted);
        text-align: center;
        padding: 40px 20px;
        font-size: 13px;
      }

      .settings-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .settings-grid label { grid-column: 1 / -1; color: var(--muted); font-size: 12px; margin-top: 8px; }
      .settings-grid input, .settings-grid textarea { grid-column: 1 / -1; }

      .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: var(--panel-2);
        border: 1px solid var(--border);
        padding: 10px 14px;
        border-radius: 6px;
        font-size: 13px;
        opacity: 0;
        transition: opacity 0.2s;
        pointer-events: none;
      }
      .toast.show { opacity: 1; }
      .toast.error { border-color: var(--danger); }
      .toast.success { border-color: var(--accent); }

      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th, td {
        text-align: left;
        padding: 8px 10px;
        border-bottom: 1px solid var(--border);
      }
      th { color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
      .platform-pill {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 11px;
        background: var(--panel-2);
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>HZSec Growth</h1>
      <span class="status" id="status">Ready</span>
    </header>

    <nav>
      <button data-tab="opportunities" class="active">Opportunities</button>
      <button data-tab="drafts">Drafts</button>
      <button data-tab="emails">Email List</button>
      <button data-tab="sent">Sent Log</button>
      <button data-tab="keywords">Keywords</button>
      <button data-tab="settings">Settings</button>
    </nav>

    <main>
      <!-- OPPORTUNITIES -->
      <section class="panel active" id="panel-opportunities">
        <div class="toolbar">
          <button class="btn primary" id="refresh-opps">Fetch opportunities</button>
          <span class="status" id="opps-status"></span>
        </div>
        <div id="opps-list"></div>
      </section>

      <!-- DRAFTS -->
      <section class="panel" id="panel-drafts">
        <div class="toolbar">
          <span class="status">Click "Draft reply" on an opportunity to generate three reply options.</span>
        </div>
        <div id="drafts-list"></div>
      </section>

      <!-- EMAIL LIST -->
      <section class="panel" id="panel-emails">
        <div class="toolbar">
          <input class="text" id="email-input" type="email" placeholder="person@example.com" style="flex:1" />
          <input class="text" id="email-name-input" type="text" placeholder="Name (optional)" style="flex:1" />
          <button class="btn primary" id="add-email">Add to list</button>
        </div>
        <div id="emails-list"></div>
      </section>

      <!-- SENT LOG -->
      <section class="panel" id="panel-sent">
        <div id="sent-list"></div>
      </section>

      <!-- KEYWORDS -->
      <section class="panel" id="panel-keywords">
        <div class="toolbar">
          <input class="text" id="keyword-input" type="text" placeholder='e.g. "leaked API key"' />
          <button class="btn primary" id="add-keyword">Add keyword</button>
        </div>
        <div id="keywords-list"></div>
      </section>

      <!-- SETTINGS -->
      <section class="panel" id="panel-settings">
        <div class="card">
          <div class="title">API Keys</div>
          <div class="meta">Stored locally in <code>~/Library/Application Support/hzsec-growth/</code>. Never sent anywhere except the APIs themselves.</div>
          <div class="settings-grid">
            <label>Anthropic API key (for drafting replies)</label>
            <input class="text" id="anthropic-key" type="password" placeholder="sk-ant-..." />

            <label>Anthropic model</label>
            <input class="text" id="anthropic-model" type="text" placeholder="claude-sonnet-4-5" />

            <label>Resend API key (for sending welcome emails)</label>
            <input class="text" id="resend-key" type="password" placeholder="re_..." />

            <label>From email (must be a domain verified with Resend)</label>
            <input class="text" id="resend-from" type="email" placeholder="hello@hzsec.io" />

            <label>From name</label>
            <input class="text" id="resend-from-name" type="text" placeholder="HZSec" />

            <label>Website URL (used in drafts and emails)</label>
            <input class="text" id="website-url" type="url" placeholder="https://hzsec.io" />

            <label>Product pitch (the one-liner Claude uses in drafts)</label>
            <textarea class="text" id="product-pitch"></textarea>
          </div>
          <div class="toolbar" style="margin-top:16px">
            <button class="btn primary" id="save-settings">Save settings</button>
          </div>
        </div>
      </section>
    </main>

    <div class="toast" id="toast"></div>

    <script src="renderer.js"></script>
  </body>
</html>
